{% extends "base.html" %}

{% block title %}B站账号登录 - Bilibili平台{% endblock %}

{% block content %}
<div class="auth-container">
    <h2 class="auth-title">B站账号登录</h2>
    
    <form class="auth-form">
        <div class="form-group">
            <label for="username">B站用户名/邮箱</label>
            <input type="text" id="username" name="username" required>
        </div>
        
        <div class="form-group">
            <label for="password">密码</label>
            <input type="password" id="password" name="password" required>
        </div>
        
        <div class="form-group">
            <button type="button" class="btn btn-primary w-full password-login-btn" 
                    data-url="{{ url_for('auth.api_bilibili_password_login') }}">
                登录
            </button>
        </div>
    </form>
    
    <div class="mt-4">
        <a href="{{ url_for('auth.bilibili_qrcode_login') }}" class="btn btn-outline w-full">
            使用二维码登录
        </a>
    </div>
    
    <div class="mt-4">
        <a href="{{ url_for('auth.login') }}" class="btn btn-secondary w-full">
            返回平台登录
        </a>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const loginBtn = document.querySelector('.password-login-btn');
    if (loginBtn) {
        loginBtn.addEventListener('click', function(e) {
            e.preventDefault();
            const form = this.closest('form');
            const username = form.querySelector('input[name="username"]').value.trim();
            const password = form.querySelector('input[name="password"]').value.trim();
            const url = this.dataset.url;
            
            if (!username || !password) {
                showNotification('用户名和密码不能为空', 'error');
                return;
            }
            
            fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCsrfToken()
                },
                body: JSON.stringify({ username: username, password: password })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    showNotification(data.message, 'success');
                    window.location.href = "{{ url_for('user.profile') }}";
                } else {
                    showNotification(data.message, 'error');
                }
            })
            .catch(error => {
                console.error('登录失败:', error);
                showNotification('登录失败，请重试', 'error');
            });
        });
    }
    
    function getCsrfToken() {
        const meta = document.querySelector('meta[name="csrf-token"]');
        return meta ? meta.content : '';
    }
    
    function showNotification(message, type = 'info') {
        const notification = document.createElement('div');
        notification.className = `notification notification-${type}`;
        notification.textContent = message;
        notification.style.cssText = `
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 8px;
            color: white;
            font-weight: 500;
            z-index: 9999;
            animation: slideIn 0.3s ease-out;
            background-color: ${type === 'success' ? '#4CAF50' : type === 'error' ? '#f44336' : '#2196F3'};
        `;
        
        document.body.appendChild(notification);
        
        setTimeout(() => {
            notification.style.animation = 'fadeOut 0.3s ease-in';
            setTimeout(() => notification.remove(), 300);
        }, 3000);
    }
});
</script>
{% endblock %}
