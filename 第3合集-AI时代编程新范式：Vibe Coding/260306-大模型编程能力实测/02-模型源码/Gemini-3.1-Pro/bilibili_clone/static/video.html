<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>视频播放 - Bilibili Clone</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flv.js/dist/flv.min.js"></script>
</head>
<body>
    <header class="header">
        <a href="/" class="logo">Bilibili Clone</a>
        <div class="search-bar">
            <input type="text" id="search-input" placeholder="输入BVID搜索视频">
            <button onclick="doSearch()">搜索</button>
        </div>
        <div class="nav-right">
            <div id="user-avatar" class="avatar" style="display: none;">已登录</div>
            <button id="login-btn" class="login-btn">登录</button>
        </div>
    </header>

    <div class="video-page">
        <div class="main-content">
            <div class="video-header">
                <h1 id="video-title">加载中...</h1>
                <div class="video-meta">
                    <span id="video-meta-text">--</span>
                    <a id="bili-link" href="#" target="_blank" style="margin-left: 15px; color: #fb7299;">在B站官网观看</a>
                </div>
            </div>
            
            <div class="player-container">
                <video id="video-player" controls width="100%" height="100%" style="background: black;"></video>
            </div>

            <div class="comments-section">
                <h3>评论 <span id="comment-count">0</span></h3>
                <div class="comment-input">
                    <textarea id="comment-text" placeholder="发条友善的评论"></textarea>
                    <button onclick="sendComment()">发表评论</button>
                </div>
                <div class="comment-list" id="comment-list">
                    <!-- Comments injected here -->
                    <div>加载评论中...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Login Modal -->
    <div id="login-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2>扫码登录</h2>
            <div id="qrcode-container"></div>
            <p id="login-status">正在获取二维码...</p>
        </div>
    </div>

    <script src="/static/js/main.js"></script>
    <script src="/static/js/video.js"></script>
</body>
</html>
