                - text: Django 插件系统实战：给博客加上 8 个横向能力
            - generic [ref=f2e30]:
              - heading "一、Django 插件系统实战：给博客加上 8 个横向能力" [level=2] [ref=f2e31]
              - paragraph [ref=f2e32]: 很多 Django 博客系统在业务膨胀之后，views.py 会变成一个"全家桶"——阅读计数、SEO、版权、懒加载、阅读时长全挤在一起。 每当想加或卸一个小功能，都必须动核心代码。
              - paragraph [ref=f2e33]:
                - text: 今天介绍的 DjangoBlog 插件系统用一个很轻量的机制解决了这个问题：
                - strong [ref=f2e34]: Hook 发布订阅 + Filter 管道
                - text: 。 整条链路只有 3 个文件 hooks.py / base.py / loader.py，但能挂载任意数量插件。
              - heading "二、HookRegistry 如何工作" [level=2] [ref=f2e35]
              - paragraph [ref=f2e36]: 核心代码在 ArticleDetailView.get_object() 的最后一句话：
              - code [ref=f2e39]: obj = hooks.apply_filters('after_article_body_get', obj) or obj
              - paragraph [ref=f2e40]: 这一行会按 priority 从 10 到 80 的顺序，把 article 对象依次喂给 8 个回调。 每个回调都在 article 身上贴一块数据或改写正文，最终模板里能直接消费。
              - paragraph [ref=f2e41]: article 对象 → view_count → seo_optimizer → copyright → recommendation → external → lazy → reading_time → cloudflare_cache → 进模板
              - heading "三、8 个内置插件一览" [level=2] [ref=f2e42]
              - paragraph [ref=f2e43]: 下面每一节都对应一个真实插件，功能都跑在本文上：
              - heading "3.1 view_count — 文章浏览计数" [level=3] [ref=f2e44]
              - paragraph [ref=f2e45]: 插件每次被触发都调 article.views += 1 并保存数据库。 你阅读到此时这个数字已经不是第一次刷新的值——每次 F5 都会累加。本文本身在测时已经被看十几二十次。
              - heading "3.2 seo_optimizer — SEO 增强" [level=3] [ref=f2e46]
              - paragraph [ref=f2e47]: 插件会在 article 对象上挂 article.seo_title 和 article.seo_keywords 两个字段。 本系统已把它接进 的 标签，和 。 想看实际产出，可以在本页右键 → 查看页面源代码，搜 "keywords" 或 "og:title"，值就来自这篇文章的标题+标签名拼接。
              - heading "3.3 article_copyright — 版权声明" [level=3] [ref=f2e48]
              - paragraph [ref=f2e49]: 插件在每篇文末附加 CC BY-NC-SA 4.0 版权声明，署名为本文作者 admin。 在博客的实际部署里，这个声明会作为文章的一部分永久保留，转载时自动带出作者名。
              - heading "3.4 article_recommendation — 智能推荐" [level=3] [ref=f2e50]
              - paragraph [ref=f2e51]: 插件通过查询与本文共享 Django 或 Python 标签的文章，按发表状态过滤、去重、最多取 5 篇。 这一招其实很简单：
              - code [ref=f2e54]: tag_ids = article.tags.values_list('pk', flat=True) related = Article.objects.filter(tags__in=tag_ids, status='p').exclude(pk=article.pk).distinct()[:5]
              - heading "3.5 external_links — 外链识别" [level=3] [ref=f2e55]
              - paragraph [ref=f2e56]: 插件用正则扫 article.body 把所有指向本站外的 http(s) 链接单独拉出来，模板里渲染成"本文引用"卡片。 一个典型用途是给出站链接自动加 target="_blank" 和小箭头图标，避免用户跳走。
              - paragraph [ref=f2e57]:
                - text: 插件现同时支持 HTML
                - code [ref=f2e58]: href="..."
                - text: 与 Markdown
                - code [ref=f2e59]: "[text](url)"
                - text: 两种语法，能可靠识别出站链接。 如需自定义匹配规则，只需修改
                - code [ref=f2e60]: plugins/external_links/plugin.py
                - text: 中的正则。
              - heading "3.6 image_lazy_loading — 图片懒加载" [level=3] [ref=f2e61]
              - paragraph [ref=f2e62]:
                - text: 插件把正文里所有
                - code [ref=f2e63]: <img>
                - text: 标签自动改写为
                - code [ref=f2e64]: <img loading="lazy" ...>
                - text: 。 浏览器会推迟加载这些图片直到它们接近视口，首屏加载可提升 30% 以上。 下面这张 Django 文档示意图已经被插件改写了：
              - paragraph [ref=f2e65]:
                - img "Django 框架示意图" [ref=f2e66]
              - paragraph [ref=f2e67]: 如果你"查看页面源代码"，可以看到这张图前面的 img 标签多了 loading="lazy"。
              - heading "3.7 reading_time — 阅读时长估算" [level=3] [ref=f2e68]
              - paragraph [ref=f2e69]: 插件按 字符数 / 300字/分钟 估算本文需多久读完，最少 1 分钟。 这个算法对中文其实偏低（中文均速约 400-500 字/分钟），但已经足够做阅读预期提示。
              - heading "3.8 cloudflare_cache — CDN 缓存策略" [level=3] [ref=f2e70]
              - paragraph [ref=f2e71]:
                - text: 插件给 article 挂上 cf_cache_max_age = 2592000（30 天），并配合 view 层（dispatch 中）把值搬到
                - code [ref=f2e72]: "Cache-Control: public, max-age=2592000"
                - text: HTTP 响应头，CDN/浏览器即可按 30 天缓存本详情页。
              - heading "四、怎么关掉其中任意一个" [level=2] [ref=f2e73]
              - paragraph [ref=f2e74]: 优势不在于"能加"，而在于"能不动核心代码地卸"。
              - paragraph [ref=f2e75]: 打开 DjangoBlog/settings.py，找到 ENABLED_PLUGINS 列表，删掉想要的插件字符串，重启 Django，对应功能立刻消失。
              - paragraph [ref=f2e76]: 比如删掉 image_lazy_loading 后刷新本文，再"查看页面源代码"，会发现 img 标签已经没有了 loading="lazy"。 删掉 article_copyright，底部的黄色版权条就没了。
              - paragraph [ref=f2e77]: 整条链路：settings.py → apps.py → loader.py → 少导入插件 → hooks._hooks[hook] 里少一个回调 → 少挂属性 → 模板 if 不渲染。
              - heading "五、自己动手写一个插件" [level=2] [ref=f2e78]
              - paragraph [ref=f2e79]: plugins/ 下新建目录 + 一个 plugin.py：
              - code [ref=f2e82]: "from plugins.base import BasePlugin class Plugin(BasePlugin): name = 'my_plugin' description = '演示用' version = '1.0.0' def register(self, registry): registry.register_hook('after_article_body_get', self.run, priority=15) @staticmethod def run(article, *args, **kwargs): article.my_data = \"hello from plugin\" return article"
              - paragraph [ref=f2e83]: 然后在 settings.py 的 ENABLED_PLUGINS 加入 my_plugin。
              - paragraph [ref=f2e84]: 短短 14 行，横向能力就挂上去了。这就是 Hook 解耦的魅力——核心代码完全不感知这个插件的存在。
              - heading "六、总结" [level=2] [ref=f2e85]
              - paragraph [ref=f2e86]: 8 个插件 → 1 个钩子 → 0 处核心代码改动。
              - paragraph [ref=f2e87]: DjangoBlog 插件系统是一个"轻量但完整"的参考实现： - 想要加功能 → 写一个新文件夹 + 注册一下 - 想要卸功能 → 删一个字符串 - 想要调顺序 → 改一下 priority - 出错 → 单个插件异常不影响其他（hooks.py 内部 try/except 兜底）
              - paragraph [ref=f2e88]: 适用于任何需要在请求生命周期里"挂横向能力"的 Django 项目。
