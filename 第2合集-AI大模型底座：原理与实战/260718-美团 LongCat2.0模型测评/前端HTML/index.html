<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鲜萃 · 新品上市 | 一杯鲜果，一口新鲜</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #fff;
            color: #333;
            overflow-x: hidden;
        }

        /* 顶部导航 */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 60px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            color: #ff6b35;
            letter-spacing: 2px;
        }

        .logo span {
            color: #333;
        }

        .nav-links {
            display: flex;
            gap: 40px;
            list-style: none;
        }

        .nav-links a {
            text-decoration: none;
            color: #555;
            font-size: 15px;
            font-weight: 500;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: #ff6b35;
        }

        .nav-btn {
            padding: 10px 28px;
            background: #ff6b35;
            color: #fff;
            border: none;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .nav-btn:hover {
            background: #e55a25;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 107, 53, 0.3);
        }

        /* 首屏 Hero */
        .hero {
            min-height: 100vh;
            display: grid;
            grid-template-columns: 1fr 1fr;
            align-items: center;
            padding: 120px 60px 60px;
            background: linear-gradient(135deg, #fff5f0 0%, #fff 50%, #f0f9ff 100%);
            position: relative;
            overflow: hidden;
        }

        /* 背景装饰 */
        .hero::before {
            content: '';
            position: absolute;
            top: -200px;
            right: -200px;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255, 107, 53, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            animation: float 6s ease-in-out infinite;
        }

        .hero::after {
            content: '';
            position: absolute;
            bottom: -150px;
            left: -150px;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(52, 152, 219, 0.12) 0%, transparent 70%);
            border-radius: 50%;
            animation: float 8s ease-in-out infinite reverse;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(30px, -30px); }
        }

        /* 左侧内容 */
        .hero-content {
            position: relative;
            z-index: 2;
            padding-right: 40px;
        }

        .badge {
            display: inline-block;
            padding: 8px 20px;
            background: linear-gradient(135deg, #ff6b35, #f7931e);
            color: #fff;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 24px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .hero-title {
            font-size: 64px;
            font-weight: 800;
            line-height: 1.15;
            color: #1a1a1a;
            margin-bottom: 24px;
        }

        .hero-title .highlight {
            background: linear-gradient(135deg, #ff6b35, #f7931e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero-subtitle {
            font-size: 18px;
            color: #666;
            line-height: 1.8;
            margin-bottom: 40px;
            max-width: 480px;
        }

        .hero-actions {
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .btn-primary {
            padding: 16px 40px;
            background: linear-gradient(135deg, #ff6b35, #f7931e);
            color: #fff;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 30px rgba(255, 107, 53, 0.35);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(255, 107, 53, 0.45);
        }

        .btn-secondary {
            padding: 16px 40px;
            background: transparent;
            color: #ff6b35;
            border: 2px solid #ff6b35;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-secondary:hover {
            background: #ff6b35;
            color: #fff;
            transform: translateY(-3px);
        }

        .hero-stats {
            display: flex;
            gap: 40px;
            margin-top: 50px;
            padding-top: 30px;
            border-top: 1px solid rgba(0, 0, 0, 0.08);
        }

        .stat-item {
            text-align: left;
        }

        .stat-num {
            font-size: 32px;
            font-weight: 800;
            color: #ff6b35;
        }

        .stat-label {
            font-size: 13px;
            color: #888;
            margin-top: 4px;
        }

        /* 右侧产品图 */
        .hero-visual {
            position: relative;
            z-index: 2;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .product-showcase {
            position: relative;
            width: 420px;
            height: 520px;
        }

        .product-card {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, #fff 0%, #fff8f5 100%);
            border-radius: 30px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.12);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            animation: cardFloat 4s ease-in-out infinite;
        }

        @keyframes cardFloat {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(2deg); }
        }

        .product-tag {
            position: absolute;
            top: 24px;
            left: 24px;
            padding: 6px 14px;
            background: #1a1a1a;
            color: #fff;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }

        .product-image {
            width: 260px;
            height: 340px;
            background: linear-gradient(180deg, #ffd4b8 0%, #ff9a76 50%, #ff6b35 100%);
            border-radius: 140px 140px 40px 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 100px;
            position: relative;
            box-shadow: inset -20px -20px 40px rgba(0, 0, 0, 0.1),
                        0 20px 40px rgba(255, 107, 53, 0.3);
        }

        .product-image::after {
            content: '';
            position: absolute;
            top: 20px;
            left: 30px;
            width: 60px;
            height: 80px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            filter: blur(10px);
        }

        .product-name {
            font-size: 22px;
            font-weight: 700;
            color: #1a1a1a;
            margin-top: 24px;
        }

        .product-desc {
            font-size: 14px;
            color: #888;
            margin-top: 8px;
        }

        .product-price {
            font-size: 28px;
            font-weight: 800;
            color: #ff6b35;
            margin-top: 16px;
        }

        .product-price span {
            font-size: 16px;
            color: #aaa;
            text-decoration: line-through;
            margin-left: 10px;
            font-weight: 500;
        }

        /* 浮动装饰元素 */
        .floating-item {
            position: absolute;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .floating-item.item1 {
            width: 70px;
            height: 70px;
            background: #fff;
            top: 40px;
            left: -40px;
            animation: floatItem 3s ease-in-out infinite;
        }

        .floating-item.item2 {
            width: 60px;
            height: 60px;
            background: #fff;
            top: 120px;
            right: -30px;
            animation: floatItem 3.5s ease-in-out infinite 0.5s;
        }

        .floating-item.item3 {
            width: 55px;
            height: 55px;
            background: #fff;
            bottom: 100px;
            left: -20px;
            animation: floatItem 4s ease-in-out infinite 1s;
        }

        @keyframes floatItem {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-15px) scale(1.05); }
        }

        /* 滚动提示 */
        .scroll-hint {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            color: #aaa;
            font-size: 12px;
            animation: bounce 2s ease-in-out infinite;
        }

        .scroll-hint .mouse {
            width: 24px;
            height: 38px;
            border: 2px solid #ccc;
            border-radius: 12px;
            position: relative;
        }

        .scroll-hint .mouse::after {
            content: '';
            position: absolute;
            top: 6px;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 8px;
            background: #ccc;
            border-radius: 2px;
            animation: scrollDot 1.5s ease-in-out infinite;
        }

        @keyframes scrollDot {
            0% { opacity: 1; top: 6px; }
            100% { opacity: 0; top: 18px; }
        }

        @keyframes bounce {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(8px); }
        }

        /* 响应式 */
        @media (max-width: 968px) {
            .navbar {
                padding: 16px 24px;
            }

            .nav-links {
                display: none;
            }

            .hero {
                grid-template-columns: 1fr;
                padding: 100px 24px 60px;
                text-align: center;
            }

            .hero-content {
                padding-right: 0;
            }

            .hero-title {
                font-size: 40px;
            }

            .hero-subtitle {
                margin: 0 auto 32px;
            }

            .hero-actions {
                justify-content: center;
                flex-wrap: wrap;
            }

            .hero-stats {
                justify-content: center;
            }

            .hero-visual {
                margin-top: 40px;
            }

            .product-showcase {
                width: 300px;
                height: 380px;
            }

            .product-image {
                width: 180px;
                height: 240px;
                font-size: 70px;
            }
        }
    </style>
</head>
<body>
    <!-- 顶部导航 -->
    <nav class="navbar">
        <div class="logo">鲜萃<span>.</span></div>
        <ul class="nav-links">
            <li><a href="#">首页</a></li>
            <li><a href="#">新品</a></li>
            <li><a href="#">系列</a></li>
            <li><a href="#">品牌故事</a></li>
            <li><a href="#">门店</a></li>
        </ul>
        <button class="nav-btn">立即购买</button>
    </nav>

    <!-- 首屏 Hero -->
    <section class="hero">
        <div class="hero-content">
            <div class="badge">🔥 2026 重磅新品</div>
            <h1 class="hero-title">
                一杯鲜果<br>
                <span class="highlight">一口新鲜</span>
            </h1>
            <p class="hero-subtitle">
                精选当季鲜果，100%原汁萃取，0添加防腐剂。
                每一口都是大自然的馈赠，唤醒你对新鲜的所有想象。
            </p>
            <div class="hero-actions">
                <button class="btn-primary">立即尝鲜 →</button>
                <button class="btn-secondary">了解更多</button>
            </div>
            <div class="hero-stats">
                <div class="stat-item">
                    <div class="stat-num">100%</div>
                    <div class="stat-label">鲜果原汁</div>
                </div>
                <div class="stat-item">
                    <div class="stat-num">0</div>
                    <div class="stat-label">添加防腐剂</div>
                </div>
                <div class="stat-item">
                    <div class="stat-num">50万+</div>
                    <div class="stat-label">首日销量</div>
                </div>
            </div>
        </div>

        <div class="hero-visual">
            <div class="product-showcase">
                <div class="product-card">
                    <div class="product-tag">NEW</div>
                    <div class="product-image">🥤</div>
                    <div class="product-name">鲜萃·橙意满满</div>
                    <div class="product-desc">NFC鲜橙原汁 · 330ml</div>
                    <div class="product-price">¥12.9 <span>¥16.9</span></div>
                </div>
                <div class="floating-item item1">🍊</div>
                <div class="floating-item item2">✨</div>
                <div class="floating-item item3">🌿</div>
            </div>
        </div>

        <div class="scroll-hint">
            <div class="mouse"></div>
            <span>向下滚动探索</span>
        </div>
    </section>
</body>
</html>
