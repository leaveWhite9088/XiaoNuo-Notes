            - generic [ref=f1e493]: 时点符合条件的行业企业可按规定申报享受研发费用加计扣除政策。责任单位税务总局财政部12.持续确保出口企业正常出口退税平均办理时间在6个工作日内将办理一类二类出口企业正常出口退免税的平均时间压缩在3个工作日内政策延续实施至2024年底。更新发布国别地区投资税收指南帮助民营企业更好防范跨境投资税收风险。责任单位税务总局13.延长普惠小微贷款支持工具期限至2024年底持续加大普惠金融支持力度。引导商业银行接入“信易贷地方征信平台等融资信用服务平台强化跨部门信用信息联通。扩大民营企业信用贷款规模。有效落实金融企业呆账核销管理制度。责任单位中国人民银行国家发展改革委金融监管总局14.将民营企业债券央地合作增信新模式扩大至全部符合发行条件的各类民营企业尽快形成更多示范案例。责任单位中国证监会国家发展改革委财政部15.适应民营中小微企业用地需求探索实行产业链供地对产业链关联项目涉及的多宗土地实行整体供应。责任单位自然资源部工业和信息化部16.除法律法规和相关政策规定外在城镇规划建设用地范围内供水供气供电企业的投资界面免费延伸至企业建筑区划红线。责任单位住房城乡建设部17.赋予民营企业职称评审权允许技术实力较强的规模以上民营企业单独或联合组建职称评审委员会开展自主评审。责任单位人力资源社会保障部三加强法治保障18.清理废除有违平等保护各类所有制经济原则的规章规范性文件加强对民营经济发展的保护和支持。责任单位司法部19.根据《中华人民共和国行政处罚法第三十三条在城市管理生态环保市场监管等重点领域分别明确不予处罚具体情形。出台《关于进一步规范监督行政罚款设定和实施的指导意见。开展行政法规和部门规章中罚款事项专项清理清理结果对社会公布。责任单位司法部生态环境部市场监管总局应急管理部四优化涉企服务20.全面构建亲清政商关系支持各地区探索以不同方式服务民营企业充分利用全国一体化政务服务平台等数字化手段提升惠企政策和服务效能多措并举帮助民营企业解决问题困难。责任单位全国工商联国家发展改革委21.建立涉企行政许可相关中介服务事项清单管理制度未纳入清单的事项一律不再作为行政审批的受理条件今后确需新设的依照法定程序设定并纳入清单管理。将中介服务事项纳入各级一体化政务服务平台实现机构选择费用支付报告上传服务评价等全流程线上办理公开接受社会监督。责任单位工业和信息化部市场监管总局国家发展改革委22.加大对拖欠民营企业账款的清理力度重点清理机关事业单位国有企业拖欠中小微企业账款。审计部门接受民营企业反映的欠款线索加强审计监督。责任单位工业和信息化部国家发展改革委财政部审计署国务院国资委市场监管总局23.全面落实简易注销普通注销制度完善企业注销“一网服务平台。完善歇业制度配套政策措施。责任单位市场监管总局人力资源社会保障部税务总局24.除依法需要保密外涉企政策制定和修订应充分听取企业家意见建议。涉企政策调整应设置合理过渡期。责任单位国家发展改革委五营造良好氛围25.分级畅通涉企投诉渠道在国务院“互联网＋督查平台开设涉企问题征集专题公告在国家政务服务平台投诉建议系统上开设涉企问题征集专栏各地区结合自身实际将涉企投诉事项纳入“12345热线等政务服务平台建立转办整改跟踪机制。持续开展万家民营企业评营商环境工作。责任单位国务院办公厅市场监管总局国家发展改革委全国工商联26.开展“打假治敲等专项行动依法打击蓄意炒作造谣抹黑民营企业和民营企业家的“网络黑嘴和“黑色产业链。责任单位公安部中国证监会全国工商联27.将各地区落实支持民营经济发展情况纳入国务院年度综合督查对发现的问题予以督促整改对好的经验做法予以宣传推广。设立中央预算内投资促进民间投资奖励支持专项每年向一批民间投资增速快占比高活力强措施实的市县提供奖励支持。责任单位国务院办公厅国家发展改革委28.按照国家有关规定对在民营经济发展工作中作出突出贡献的集体和个人予以表彰奖励弘扬企业家精神发挥先进标杆的示范引领作用。责任单位全国工商联国家发展改革委工业和信息化部国家发展改革委工业和信息化部财政部科技部中国人民银行税务总局市场监管总局金融监管总局2023年7月28日
