            - generic [ref=f1e488]: 税人因各种原因未在今年7月征期内及时享受研发费用加计扣除政策的可在89月份由纳税人通过变更第二季度或6月份企业所得税预缴申报的方式补充享受；积极会同相关部门收集编发研发项目鉴定案例帮助符合条件的中小微企业充分准确享受研发费用加计扣除政策红利。六针对小规模纳税人减免增值税优惠小型微利企业和个体工商户所得税优惠等政策加大自主申报自行享受的落实力度不断拓展适用范围。七完善减税降费红利账单推送机制优化改进系统功能探索开展红利账单个性化定制化推送服务。二进一步便利税费办理八对“企业财务会计制度等11项证明材料采用调阅复用措施减少资料重复报送减轻办税缴费负担。九深化落实“个体工商户经营者身份证明等12项税务证明事项告知承诺制严控新设税务证明事项没有法律行政法规依据不得要求纳税人在申请办理税务事项前自行检测检验认证鉴定公证或提供证明等。十推广数字化电子发票助力中小企业数字化转型进一步降低中小企业制度性交易成本。十一持续优化增值税企业所得税个人所得税等税种申报预填服务在具备数据条件地区创新环境保护税纳税申报方式探索智能预填缩短填报时间。十二优化中小企业跨省迁移办理流程对符合条件的中小企业税务机关按规定及时办理迁出手续迁移信息同步推送至迁入地税务机关。十三进一步优化银税信用信息共享方式在保障数据安全维护纳税人合法权益的前提下帮助更多民营企业凭借良好纳税信用通过“银税互动获得融资支持。三进一步改进诉求响应十四充分发挥税费服务诉求解决机制作用税务总局各省税务局同步建立民营企业直联点常态化开展民营企业走访座谈系统梳理中小企业反映强烈的问题研究务实管用的解决措施及时响应纳税人缴费人合理诉求。十五组织税务系统延续开展中小企业服务季活动聚焦中小企业和个体工商户所需所盼拓展创新服务举措推动新出台的系列减税降费政策更好落实落细。十六进一步加强与工商联等部门联动积极面向民营企业开展多领域多层次线上线下相结合的税费专业培训辅导积极探索对不同类型民营企业提供个性化服务帮助处于转型升级阶段的民营企业提升合规能力。十七各地税务机关协同本地商会组织设立民营企业服务站或服务顾问深入开展普法答疑调解维权等工作及时满足企业税费咨询等服务需求。四进一步深化跨境服务十八简并企业报告境外投资和所得信息有关报表减少报送频次进一步降低企业申报负担。十九优化电子税务局国际贸易“单一窗口服务功能推行出口退税发票及出口报关单信息“免填报进一步提高民营企业等各类企业办理出口退税便利度。二十设立12366跨境服务咨询专线加强跨境经营高频疑难涉税问题的收集整理推出并不断完善“跨境纳税人疑难问题解答拓宽民营企业解疑释惑渠道。二十一结合民营企业境外投资特点在税务总局官网推出“海外税收案例库更新发布国别地区投资税收指南帮助“走出去民营企业防范税务风险提升税法遵从能力。二十二深化运用税收协定相互协商程序预约定价安排等国际税收法律工具更大力度地帮助民营企业等纳税人解决跨境涉税争议提高跨境经营的税收确定性。二十三依托“一带一路税收征管合作机制深化共建“一带一路国际税收合作为民营企业更好“走出去创造良好税收环境。五进一步优化执法方式二十四坚持依法依规征税收费坚决不收“过头税费拓展并畅通12366纳税缴费服务热线等投诉举报渠道对征收“过头税费行为发现一起严肃查处一起。二十五加快推进制定区域统一的税务行政处罚裁量基准促进区域间税收执法协同。二十六对符合条件确有困难的民营企业发生欠税税务机关辅导其制定清欠计划对按计划缴纳税款的暂不采取强制执行措施。二十七坚持教育与处罚相结合进一步严格落实“首违不罚制度对税务行政处罚“首违不罚事项清单中的14个事项首次发生且危害后果轻微在税务机关发现前主动改正或者在税务机关依法规定的期限内改正的不予行政处罚。二十八严格落实税务规范性文件公平竞争和权益性审核制度加强相关政策措施的审核力度切实维护中小微企业和个体工商户等民营经济纳税人合法权益确保对各类所有制企业一视同仁平等对待。各级税务机关要坚持以习近平新时代中国特色社会主义思想为指导完整准确全面贯彻新发展理念坚决贯彻落实“两个毫不动摇充分认识促进民营经济发展壮大的重要意义充分认识做好当前税务工作对推动国民经济持续恢复和高质量发展的重要意义切实增强使命感和责任感把认真抓好《意见落实认真贯彻中央政治局会议和国务院常务会议精神作为深入推进税务系统主题教育的重要任务紧密结合实际创造性开展工作依法依规为纳税人缴费人解难题办实事主动协同高效作为靠前贴近精细服务着力促进民营经济做大做优做强。要结合不断创新和发展“晋江经验的要求不断丰富完善税务部门服务中小微企业和个体工商户的措施办法及时总结推广各地税务机关特别是民营经济活力较强地区的好经验好做法对行之有效的经验做法固定下来形成制度确保党中央国务院促进民营经济发展壮大和新出台的系列减税降费政策等决策部署在税务系统不折不扣落地见效为服务高质量发展作出新的更大贡献。附件“便民办税春风行动任务安排表.xls国家税务总局2023年8月4日
