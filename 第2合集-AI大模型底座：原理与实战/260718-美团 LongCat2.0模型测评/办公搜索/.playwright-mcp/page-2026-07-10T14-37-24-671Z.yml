            - link "国家税务总局 财政部关于优化预缴申报享受研发费用加计扣除政策有关事项的公告" [ref=f1e482] [cursor=pointer]:
              - /url: http://fgk.chinatax.gov.cn/zcfgk/c100012/c5209840/content.html
            - generic [ref=f1e483]: 实施条例等相关规定现就优化预缴申报享受研发费用加计扣除政策有关事项公告如下一企业7月份预缴申报第2季度按季预缴或6月份按月预缴企业所得税时能准确归集核算研发费用的可以结合自身生产经营实际情况自主选择就当年上半年研发费用享受加计扣除政策。对7月份预缴申报期未选择享受优惠的企业在10月份预缴申报或年度汇算清缴时能够准确归集核算研发费用的可结合自身生产经营实际情况自主选择在10月份预缴申报或年度汇算清缴时统一享受。二企业10月份预缴申报第3季度按季预缴或9月份按月预缴企业所得税时能准确归集核算研发费用的企业可结合自身生产经营实际情况自主选择就当年前三季度研发费用享受加计扣除政策。对10月份预缴申报期未选择享受优惠的企业在年度汇算清缴时能够准确归集核算研发费用的可结合自身生产经营实际情况自主选择在年度汇算清缴时统一享受。三企业享受研发费用加计扣除优惠政策采取“真实发生自行判别申报享受相关资料留存备查的办理方式由企业依据实际发生的研发费用支出自行计算加计扣除金额填报《中华人民共和国企业所得税月季度预缴纳税申报表A类享受税收优惠并根据享受加计扣除优惠的研发费用情况上半年或前三季度填写《研发费用加计扣除优惠明细表A107012。《研发费用加计扣除优惠明细表A107012与规定的其他资料一并留存备查。四本公告自2023年1月1日起施行。《国家税务总局关于企业预缴申报享受研发费用加计扣除优惠政策有关事项的公告2022年第10号同时废止。特此公告。国家税务总局财政部2023年6月21日
