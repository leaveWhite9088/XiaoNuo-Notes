            - generic [ref=f1e478]: 政部税务总局等部门制定。四企业享受研发费用加计扣除政策的其他政策口径和管理要求按照《财政部国家税务总局科技部关于完善研究开发费用税前加计扣除政策的通知财税〔2015〕119号《财政部税务总局科技部关于企业委托境外研究开发费用税前加计扣除有关政策问题的通知财税〔2018〕64号等文件相关规定执行。五本公告规定的税收优惠政策采用清单管理的由国家发展改革委工业和信息化部于每年3月底前按规定向财政部税务总局提供上一年度可享受优惠的企业清单；不采取清单管理的税务机关可按《财政部税务总局发展改革委工业和信息化部关于促进集成电路产业和软件产业高质量发展企业所得税政策的公告财政部税务总局发展改革委工业和信息化部公告2020年第45号规定的核查机制转请发展改革工业和信息化部门进行核查。特此公告。附件先进工业母机产品基本标准.doc财政部税务总局国家发展改革委工业和信息化部2023年9月12日
